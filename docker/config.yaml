NodeId: edge-docker-01

TCP:  { Enabled: true,  Port: 1883, Address: "0.0.0.0" }
TCPS: { Enabled: false, Port: 8883, Address: "0.0.0.0", KeyStorePath: "", KeyStorePassword: "" }
WS:   { Enabled: true,  Port: 1884, Address: "0.0.0.0" }
WSS:  { Enabled: false, Port: 8884, Address: "0.0.0.0" }
MaxMessageSize: 1048576

DefaultStoreType: SQLITE
SessionStoreType: SQLITE
RetainedStoreType: MEMORY
ConfigStoreType: SQLITE

SQLite:
  Path: /data/monstermq.db

UserManagement:
  Enabled: false
  PasswordAlgorithm: BCRYPT
  AnonymousEnabled: true
  AclCacheEnabled: true

Metrics:
  Enabled: true
  CollectionIntervalSeconds: 1
  RetentionHours: 168

Logging:
  Level: INFO
  MqttSyslogEnabled: false
  RingBufferSize: 1000

GraphQL:
  Enabled: true
  Port: 4000

Features:
  MqttClient: true
  WinCCUa: true

QueuedMessagesEnabled: true
