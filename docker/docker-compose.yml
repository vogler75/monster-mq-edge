services:
  monstermq-edge:
    image: rocworks/monstermq-edge:latest
    container_name: monstermq-edge
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT TCP
      - "1884:1884"   # MQTT WebSocket
      - "8080:8080"   # GraphQL
    volumes:
      - ./config:/config:ro
      - ./data:/data
